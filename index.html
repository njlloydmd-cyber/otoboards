<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Oto Boards Prep</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              primary: 'var(--color-primary)',
              secondary: 'var(--color-secondary)',
              accent: 'var(--color-accent)',
            },
             keyframes: {
              spinner: {
                '0%': { transform: 'rotate(0deg)' },
                '100%': { transform: 'rotate(360deg)' },
              },
              pulse: {
                '0%, 100%': { opacity: 1 },
                '50%': { opacity: .5 },
              }
            },
            animation: {
              spinner: 'spinner 1.2s linear infinite',
              pulse: 'pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite',
            }
          },
        },
      }
    </script>
    <style>
      :root {
        --color-primary: #1e3a8a; /* blue-800 */
        --color-secondary: #f1f5f9; /* slate-100 */
        --color-accent: #4338ca; /* indigo-700 */

        /* THEME COLORS - LIGHT */
        --c-bg-body: #f8fafc; /* slate-50 */
        --c-text-default: #1e293b; /* slate-800 */
        --c-text-muted: #475569; /* slate-600 */
        --c-text-subtle: #64748b; /* slate-500 */
        --c-bg-card: #ffffff;
        --c-border: #cbd5e1; /* slate-300 */
        --c-bg-subtle: #f1f5f9; /* slate-100 */
        --c-primary-bg: #eff6ff; /* blue-50 */
        --c-disabled-bg: #e2e8f0; /* slate-200 */
        --c-success-bg: #f0fdf4; /* green-50 */
        --c-success-border: #4ade80; /* green-400 */
        --c-danger-bg: #fef2f2; /* red-50 */
        --c-danger-border: #f87171; /* red-400 */
      }

      @media (prefers-color-scheme: dark) {
        :root {
          /* THEME COLORS - DARK */
          --color-primary: #60a5fa; /* blue-400 */
          --c-bg-body: #0f172a; /* slate-900 */
          --c-text-default: #e2e8f0; /* slate-200 */
          --c-text-muted: #cbd5e1; /* slate-300 */
          --c-text-subtle: #94a3b8; /* slate-400 */
          --c-bg-card: #1e293b; /* slate-800 */
          --c-border: #475569; /* slate-600 */
          --c-bg-subtle: #1a2436; /* custom dark slate */
          --c-primary-bg: rgba(96, 165, 250, 0.1); /* transparent version of dark primary */
          --c-disabled-bg: #334155; /* slate-700 */
          --c-success-bg: rgba(74, 222, 128, 0.1);
          --c-success-border: #4ade80; /* green-400 */
          --c-danger-bg: rgba(239, 68, 68, 0.1);
          --c-danger-border: #ef4444; /* red-500 */
        }
      }
      
      /* Apply variables to base and override tailwind classes */
      body { 
        background-color: var(--c-bg-body); 
        color: var(--c-text-default);
      }

      .bg-white { background-color: var(--c-bg-card) !important; }
      
      .text-slate-800, .text-slate-700 { color: var(--c-text-default) !important; }
      .text-slate-600 { color: var(--c-text-muted) !important; }
      .text-slate-500, .text-slate-400 { color: var(--c-text-subtle) !important; }
      
      .border-l-4.border-primary { border-color: var(--color-primary) !important; }
      .border-slate-300 { border-color: var(--c-border) !important; }
      .border-slate-200 { border-color: var(--c-border) !important; opacity: 0.5; }
      .border-t-2.border-slate-200 { border-color: var(--c-border) !important; opacity: 0.5; }


      .bg-slate-100 { background-color: var(--c-bg-subtle) !important; }
      .bg-slate-200 { background-color: var(--c-disabled-bg) !important; opacity: 0.5; }
      
      /* Inputs */
      select, input[type="text"] {
        background-color: var(--c-bg-card);
        border-color: var(--c-border);
        color: var(--c-text-default);
      }
      select:focus, input[type="text"]:focus {
        --tw-ring-color: var(--color-primary) !important;
      }
      input[type="range"].accent-primary {
          accent-color: var(--color-primary);
      }

      /* Specific Components */
      .disabled\:bg-slate-300:disabled { background-color: var(--c-disabled-bg) !important; }
      .bg-green-50, .bg-green-100 { background-color: var(--c-success-bg) !important; }
      .border-green-500 { border-color: var(--c-success-border) !important; }
      .bg-red-50, .bg-red-100 { background-color: var(--c-danger-bg) !important; }
      .border-red-500 { border-color: var(--c-danger-border) !important; }
      .bg-blue-50 { background-color: var(--c-primary-bg) !important; }
    </style>
</head>
  <body>
    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
