services:
  - type: web
    name: otoboards
    runtime: node
    plan: free
    buildCommand: npm install --include=dev && npm run build
    # NODE_ENV is set here, not as a service-level env var, so it only applies at
    # runtime — not during `npm install` in the build step. Setting it globally would
    # make `npm install` silently skip devDependencies (vite, esbuild, etc.), which
    # breaks the build with a "command not found" error.
    startCommand: NODE_ENV=production npm start
    envVars:
      # Render prompts you to fill these in during the Blueprint creation flow.
      # Get ANTHROPIC_API_KEY from https://console.anthropic.com/settings/keys
      - key: ANTHROPIC_API_KEY
        sync: false
      # Optional — only needed for the Question Bank feature. See README.md
      # "Setting up the Question Bank" for how to generate this value. Leave
      # blank in the prompt (just hit through) if you don't need it yet.
      - key: FIREBASE_SERVICE_ACCOUNT_BASE64
        sync: false
      # The four below are for the OPTIONAL cross-device sync feature (Google sign-in).
      # These are public values (safe to expose in the browser bundle — they are not secrets,
      # unlike FIREBASE_SERVICE_ACCOUNT_BASE64 above), from Firebase Console → Project Settings
      # → General → Your apps → (Web app) → SDK setup and configuration. See README.md
      # "Setting up cross-device sync" for the full walkthrough. Leave all four blank if you
      # don't want this feature — the app works fully without it.
      - key: VITE_FIREBASE_API_KEY
        sync: false
      - key: VITE_FIREBASE_AUTH_DOMAIN
        sync: false
      - key: VITE_FIREBASE_PROJECT_ID
        sync: false
      - key: VITE_FIREBASE_APP_ID
        sync: false
